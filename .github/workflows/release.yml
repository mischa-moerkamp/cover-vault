name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/release.txt
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Lint and test
        run: |
          ruff check .
          ruff format --check .
          python -m pytest -q
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION" || { echo "Tag $RELEASE_TAG does not match v$PACKAGE_VERSION"; exit 1; }

  windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/release.txt
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: ./packaging/windows/build.ps1
      - name: Write SHA-256 checksum
        shell: pwsh
        run: |
          Get-ChildItem dist/installer/*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content dist/installer/SHA256SUMS-windows.txt
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-installer
          path: |
            dist/installer/*.exe
            dist/installer/SHA256SUMS-windows.txt
          if-no-files-found: error

  macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/release.txt
      - name: Build DMG
        run: bash ./packaging/macos/build.sh
      - name: Write SHA-256 checksum
        run: |
          cd dist
          shasum -a 256 *.dmg > SHA256SUMS-macos.txt
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-dmg
          path: |
            dist/*.dmg
            dist/SHA256SUMS-macos.txt
          if-no-files-found: error

  linux:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/release.txt
      - name: Build DEB
        run: |
          chmod +x packaging/linux/build.sh
          bash packaging/linux/build.sh
      - name: Write SHA-256 checksum
        run: |
          cd dist
          sha256sum *.deb > SHA256SUMS-linux.txt
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-deb
          path: |
            dist/*.deb
            dist/SHA256SUMS-linux.txt
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download installer artifacts from this workflow run
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p release-assets
          gh run download "$GITHUB_RUN_ID" --name windows-installer --dir release-assets
          gh run download "$GITHUB_RUN_ID" --name macos-dmg --dir release-assets
          gh run download "$GITHUB_RUN_ID" --name linux-deb --dir release-assets
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              release-assets/* \
              --verify-tag \
              --generate-notes \
              --title "Cover Vault $GITHUB_REF_NAME"
          fi
